version: '3.8'
# Unraid deployment – uses pre-built images from GitHub Container Registry.
# Set PRODUCTION_API_URL to your Unraid server address, e.g. http://192.168.1.x:8100

services:
  backend:
    image: ghcr.io/piodoi/promoter-backend:latest
    container_name: promoter-backend
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - PROMOTER_DATA_DIR=/app/data
      - COPILOT_API_BASE_URL=${COPILOT_API_BASE_URL:-https://models.github.ai/inference}
      - COPILOT_MODEL=${COPILOT_MODEL:-openai/gpt-4.1-mini}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - promoter-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/piodoi/promoter-frontend:latest
    container_name: promoter-frontend
    restart: unless-stopped
    ports:
      - "4174:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  promoter-data:
