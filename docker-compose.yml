version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promoter-backend
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      - PROMOTER_DATA_DIR=/app/data
      - COPILOT_API_BASE_URL=${COPILOT_API_BASE_URL:-https://models.github.ai/inference}
      - COPILOT_MODEL=${COPILOT_MODEL:-openai/gpt-4.1-mini}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:4174,http://localhost:5174}
    volumes:
      - promoter-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8100}
    container_name: promoter-frontend
    restart: unless-stopped
    ports:
      - "4174:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  promoter-data: